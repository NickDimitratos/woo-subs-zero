name: Build and Release Package

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          version=""
          source=""

          head_tag="$(git tag --points-at HEAD | grep -E '^[vV]?[0-9]+' | head -n 1 || true)"

          if [[ -n "$head_tag" ]]; then
            version="${head_tag#[vV]}"
            source="tag:${head_tag}"
          fi

          if [[ -z "$version" && -f style.css ]]; then
            version="$(sed -nE 's/^Version:[[:space:]]*(.+)$/\1/p' style.css | head -n 1)"
            source="style.css"
          fi

          if [[ -z "$version" && -f package.json ]]; then
            version="$(node -p "require('./package.json').version" 2>/dev/null || true)"
            source="package.json"
          fi

          if [[ -z "$version" && -f wsz-woo-subscriptions.php ]]; then
            version="$(sed -nE 's/^[[:space:]]*\*[[:space:]]*Version:[[:space:]]*(.+)$/\1/p' wsz-woo-subscriptions.php | head -n 1)"
            source="wsz-woo-subscriptions.php"
          fi

          version="$(echo "$version" | tr -d '\r' | xargs)"

          if [[ -z "$version" ]]; then
            echo "Unable to determine release version from tag, style.css, package.json, or plugin header."
            exit 1
          fi

          tag="v${version}"

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "source=$source" >> "$GITHUB_OUTPUT"

          echo "Resolved version: $version"
          echo "Version source: $source"

      - name: Validate Composer metadata
        if: ${{ hashFiles('composer.json') != '' }}
        run: composer validate --strict

      - name: Install dependencies
        if: ${{ hashFiles('composer.json') != '' }}
        run: composer install --prefer-dist --no-interaction

      - name: Lint PHP files
        run: composer run lint

      - name: Run PHPUnit
        run: composer run test

      - name: Install production dependencies for package
        if: ${{ hashFiles('composer.json') != '' }}
        run: composer install --no-dev --prefer-dist --optimize-autoloader --no-interaction

      - name: Build ZIP package
        id: package
        shell: bash
        run: |
          set -euo pipefail

          slug="${GITHUB_REPOSITORY##*/}"
          version="${{ steps.version.outputs.version }}"
          workdir="$RUNNER_TEMP/package"
          staged_dir="$workdir/$slug"
          zip_name="${slug}-${version}.zip"
          zip_path="$workdir/$zip_name"

          rm -rf "$workdir"
          mkdir -p "$staged_dir"

          rsync -a ./ "$staged_dir/" \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude '.phpunit.cache/' \
            --exclude 'tests/' \
            --exclude 'docs/' \
            --exclude 'phpunit.xml.dist' \
            --exclude '.gitignore' \
            --exclude '.DS_Store' \
            --exclude '*.zip'

          (
            cd "$workdir"
            zip -rq "$zip_name" "$slug"
          )

          echo "zip_name=$zip_name" >> "$GITHUB_OUTPUT"
          echo "zip_path=$zip_path" >> "$GITHUB_OUTPUT"

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.package.outputs.zip_name }}
          path: ${{ steps.package.outputs.zip_path }}

      - name: Decide whether to publish release
        id: release
        shell: bash
        run: |
          set -euo pipefail

          should_release="false"
          reason="not a release event"

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            should_release="true"
            reason="manual workflow dispatch"
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            should_release="true"
            reason="version tag push"
          elif [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF}" == "refs/heads/main" ]]; then
            previous_sha="${{ github.event.before }}"
            current_version="${{ steps.version.outputs.version }}"
            previous_version=""

            if [[ -n "$previous_sha" && "$previous_sha" != "0000000000000000000000000000000000000000" ]]; then
              previous_version="$(git show "${previous_sha}:wsz-woo-subscriptions.php" 2>/dev/null \
                | sed -nE 's/^[[:space:]]*\*[[:space:]]*Version:[[:space:]]*(.+)$/\1/p' \
                | head -n 1 \
                | tr -d '\r' \
                | xargs || true)"
            fi

            if [[ -z "$previous_version" ]]; then
              should_release="true"
              reason="main push with no previous plugin version"
            elif [[ "$previous_version" != "$current_version" ]]; then
              should_release="true"
              reason="main plugin version changed from ${previous_version} to ${current_version}"
            else
              reason="main plugin version unchanged (${current_version})"
            fi
          fi

          echo "should_release=$should_release" >> "$GITHUB_OUTPUT"
          echo "reason=$reason" >> "$GITHUB_OUTPUT"
          echo "Release decision: $should_release ($reason)"

      - name: Create or update GitHub release and attach ZIP
        if: ${{ steps.release.outputs.should_release == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
          RELEASE_NAME: Woo Subs-Zero v${{ steps.version.outputs.version }}
          ZIP_PATH: ${{ steps.package.outputs.zip_path }}
        shell: bash
        run: |
          set -euo pipefail

          for attempt in 1 2 3 4 5; do
            echo "Release attempt ${attempt}/5 for ${RELEASE_TAG}"

            if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
              gh release upload "$RELEASE_TAG" "$ZIP_PATH" --clobber && exit 0
            else
              gh release create "$RELEASE_TAG" "$ZIP_PATH" \
                --title "$RELEASE_NAME" \
                --target "$GITHUB_SHA" \
                --generate-notes && exit 0
            fi

            if [[ "$attempt" -lt 5 ]]; then
              sleep $((attempt * 15))
            fi
          done

          echo "Release creation/upload failed after 5 attempts."
          exit 1
